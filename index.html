<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cartola BMP</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6321">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TAÇA BMP">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#ff6321',
                        orange: {
                            400: '#fb923c',
                            500: '#f97316',
                            600: '#ea580c'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                        jogos: ['FontJogos', 'sans-serif']
                    }
                }
            }
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&family=Jersey+25&display=swap');
        
        @font-face {
            font-family: 'FontJogos';
            src: url('./FONTS/font_jogos.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        .font-jersey {
            font-family: 'Jersey 25', sans-serif;
        }

        body {
            background-color: #f8fafc;
            margin: 0;
            padding-bottom: 100px;
            -webkit-font-smoothing: antialiased;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }

        .gray-filter {
            filter: grayscale(1) opacity(0.3);
        }

        .font-jogos {
            font-family: 'FontJogos', 'Inter', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #e2e8f0;
            border-top-color: #ff6321;
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #ff6321;
        }
    </style>
</head>

<body class="text-slate-900">

    <!-- HEADER -->
    <header class="bg-white border-b border-slate-100 sticky top-0 z-40 px-4 py-4 shadow-sm">

        <div class="max-w-7xl mx-auto flex items-center justify-between">

            <div class="flex items-center gap-4">

                <div class="w-12 h-12 flex items-center justify-center">
                    <img src="images/logo/CARTOLA.png"
                         class="w-full h-full object-contain"
                         onerror="this.onerror=null; this.style.opacity='0.5';">
                </div>

                <div>
                    <h1 class="font-jogos text-xl md:text-2xl text-slate-800 tracking-tight leading-none">
                        TAÇA <span class="text-orange-500">BMP</span>
                    </h1>

                    <p class="font-jogos text-[8px] text-slate-400 tracking-[0.4em] mt-1 uppercase">
                        2026
                    </p>
                </div>

            </div>

            <div id="header-controls" class="flex items-center gap-3">
                <!-- Round and Serie selectors -->
            </div>

        </div>

    </header>

    <!-- MAIN -->
    <main id="main-content" class="max-w-7xl mx-auto p-4 md:p-8">

        <div class="flex flex-col items-center justify-center min-h-[60vh] gap-4">
            <div class="loader"></div>

            <p class="text-slate-400 font-jogos text-sm tracking-widest animate-pulse uppercase">
                SINCRONIZANDO DADOS...
            </p>
        </div>

    </main>

    <!-- SIDEBAR BACKDROP -->
    <div id="sidebar-backdrop"
         onclick="toggleSidebar(false)"
         class="fixed inset-0 z-[50] bg-black/5 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-500">
    </div>

    <!-- SIDEBAR TOGGLE -->
    <button id="sidebar-toggle"
            onclick="toggleSidebar(true)"
            class="fixed left-0 top-1/2 -translate-y-1/2 z-[60] bg-white/90 backdrop-blur-md border border-slate-100 p-3 py-8 rounded-r-3xl shadow-2xl hover:bg-white transition-all group">

        <i data-lucide="chevron-right"
           id="sidebar-icon"
           class="w-5 h-5 text-slate-400 group-hover:text-orange-500 transition-transform">
        </i>

    </button>

    <!-- SIDEBAR -->
    <div id="sidebar-menu"
         class="fixed left-[-200px] top-1/2 -translate-y-1/2 z-[100] w-32 h-[800px] bg-white/95 backdrop-blur-2xl border border-slate-100 rounded-r-[50px] shadow-2xl transition-all duration-700 ease-in-out flex flex-col items-center overflow-hidden">

        <div class="flex flex-col items-center justify-between h-full py-20 w-full">

            <div class="flex flex-col items-center gap-14 w-full">

                <!-- JOSA.BET -->
                <button onclick="handleSidebarClick('campo')"
                        class="flex flex-col items-center gap-2.5 group w-full px-4 py-2 transition-all hover:scale-110 active:scale-95 sidebar-btn"
                        data-view="campo">

                    <div class="sidebar-icon-container w-16 h-16 rounded-[28px] flex items-center justify-center transition-all shadow-lg border-2 border-transparent bg-orange-600 text-white shadow-2xl shadow-orange-600/40 border-orange-400 ring-4 ring-orange-50">
                        <i data-lucide="layout-grid" class="w-9 h-9"></i>
                    </div>

                    <span class="sidebar-label text-[12px] font-black font-jogos uppercase text-center tracking-tight transition-all text-orange-600">
                        JOSA.BET
                    </span>

                </button>

                <!-- PROVÁVEIS -->
                <button onclick="handleSidebarClick('provaveis')"
                        class="flex flex-col items-center gap-2.5 group w-full px-4 py-2 transition-all hover:scale-110 active:scale-95 sidebar-btn"
                        data-view="provaveis">

                    <div class="sidebar-icon-container w-16 h-16 rounded-[28px] flex items-center justify-center transition-all shadow-lg border-2 border-transparent bg-slate-50 text-slate-400 border-slate-200 group-hover:bg-orange-50 group-hover:text-orange-600 group-hover:border-orange-100">
                        <i data-lucide="users" class="w-9 h-9"></i>
                    </div>

                    <span class="sidebar-label text-[12px] font-black font-jogos uppercase text-center tracking-tight transition-all text-slate-400 opacity-60">
                        PROVÁVEIS
                    </span>

                </button>

                <!-- JOGOS -->
                <button onclick="handleSidebarClick('jogos')"
                        class="flex flex-col items-center gap-2.5 group w-full px-4 py-2 transition-all hover:scale-110 active:scale-95 sidebar-btn"
                        data-view="jogos">

                    <div class="sidebar-icon-container w-16 h-16 rounded-[28px] flex items-center justify-center transition-all shadow-lg border-2 border-transparent bg-slate-50 text-slate-300 border border-slate-100 hover:bg-slate-100 hover:text-slate-500 hover:border-slate-200">

                        <svg xmlns="http://www.w3.org/2000/svg"
                             width="36"
                             height="36"
                             fill="currentColor"
                             viewBox="0 0 256 256"
                             class="w-9 h-9">

                            <path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Z"></path>

                        </svg>

                    </div>

                    <span class="sidebar-label text-[12px] font-black font-jogos uppercase text-center tracking-tight transition-all text-slate-400 opacity-60">
                        JOGOS
                    </span>

                </button>

                <!-- ANALISE -->
                <button onclick="handleSidebarClick('analise')"
                        class="flex flex-col items-center gap-2.5 group w-full px-4 py-2 transition-all hover:scale-110 active:scale-95 sidebar-btn"
                        data-view="analise">

                    <div class="sidebar-icon-container w-16 h-16 rounded-[28px] flex items-center justify-center transition-all shadow-lg border-2 border-transparent bg-slate-50 text-slate-300 border border-slate-100 hover:bg-orange-50 hover:text-orange-600 hover:border-orange-200">

                        <svg xmlns="http://www.w3.org/2000/svg"
                             width="36"
                             height="36"
                             viewBox="0 0 24 24"
                             fill="none"
                             stroke="currentColor"
                             stroke-width="2.4"
                             stroke-linecap="round"
                             stroke-linejoin="round"
                             class="w-9 h-9">

                            <path d="M3 3v18h18"/>
                            <path d="M7 14l3-3 3 2 4-5"/>
                            <circle cx="7" cy="14" r="1" fill="currentColor"/>
                            <circle cx="10" cy="11" r="1" fill="currentColor"/>
                            <circle cx="13" cy="13" r="1" fill="currentColor"/>
                            <circle cx="17" cy="8" r="1" fill="currentColor"/>

                        </svg>

                    </div>

                    <span class="sidebar-label text-[12px] font-black font-jogos uppercase text-center tracking-tight transition-all text-slate-400 opacity-60">
                        ANÁLISE
                    </span>

                </button>

                <!-- INSTALAR -->
                <button id="btn-install"
                        onclick="if(window.installApp) window.installApp(); toggleSidebar(false);"
                        class="hidden flex flex-col items-center gap-2.5 group w-full px-4 py-2 transition-all hover:scale-110 active:scale-95">

                    <div class="w-16 h-16 rounded-[28px] bg-orange-700 text-white flex items-center justify-center shadow-2xl">
                        <i data-lucide="download" class="w-9 h-9"></i>
                    </div>

                    <span class="text-[12px] font-black font-jogos uppercase text-center tracking-tight transition-all text-orange-700">
                        INSTALAR
                    </span>

                </button>

            </div>

        </div>

    </div>

    <!-- SCROLL TOP -->
    <button id="scroll-to-top"
            onclick="window.scrollTo({top: 0, behavior: 'smooth'})"
            class="fixed bottom-10 right-6 z-50 p-4 bg-orange-500/10 backdrop-blur-md border border-orange-200/30 rounded-full shadow-lg opacity-0 pointer-events-none transition-all duration-500 hover:bg-orange-500/20 hover:scale-110 group">

        <i data-lucide="arrow-up"
           class="w-5 h-5 text-orange-600/60 group-hover:text-orange-600">
        </i>

    </button>

    <!-- API -->
    <script>
        window.API_CARTOLA = {
            MERCADO_STATUS: "mercado/status",
            PARTIDAS: "partidas",
            PARTIDAS_RODADA: (r) => `partidas/${r}`,
            PONTUADOS: (r) => `atletas/pontuados/${r}`,
            AWS_ATLETAS_PONTUADOS: "escalar/rodadas-anteriores"
        };
    </script>

    <!-- SCRIPTS -->
    <script src="provaveis.js"></script>
    <script src="jogos.js"></script>
    <script src="dadoscartola.js"></script>
    <script src="josabet.js"></script>

    <!-- APP -->
    <script>

        function toggleSidebar(force) {

            const sidebar = document.getElementById("sidebar-menu");
            const toggleBtn = document.getElementById("sidebar-toggle");
            const backdrop = document.getElementById("sidebar-backdrop");

            if (!sidebar) return;

            const isOpen = sidebar.style.left === "0px";
            const nextState = force !== undefined ? force : !isOpen;

            if (nextState) {

                sidebar.style.left = "0px";

                if (toggleBtn) {
                    toggleBtn.style.opacity = "0";
                    toggleBtn.style.pointerEvents = "none";
                }

                if (backdrop) {
                    backdrop.style.opacity = "1";
                    backdrop.style.pointerEvents = "auto";
                }

            } else {

                sidebar.style.left = "-200px";

                if (toggleBtn) {
                    toggleBtn.style.opacity = "1";
                    toggleBtn.style.pointerEvents = "auto";
                }

                if (backdrop) {
                    backdrop.style.opacity = "0";
                    backdrop.style.pointerEvents = "none";
                }
            }
        }

        function handleSidebarClick(view) {

            if (window.bmpSetViewMode)
                window.bmpSetViewMode(view);

            updateSidebarUI(view);

            toggleSidebar(false);
        }

        window.updateSidebarUI = function(activeView) {

            const buttons = document.querySelectorAll('.sidebar-btn');

            buttons.forEach(btn => {

                const view = btn.getAttribute('data-view');
                const container = btn.querySelector('.sidebar-icon-container');
                const label = btn.querySelector('.sidebar-label');

                if (!container || !label) return;

                if (view === activeView) {

                    container.className =
                        "sidebar-icon-container w-16 h-16 rounded-[28px] flex items-center justify-center transition-all shadow-lg border-2 border-transparent bg-orange-600 text-white shadow-2xl shadow-orange-600/40 border-orange-400 ring-4 ring-orange-50";

                    label.className =
                        "sidebar-label text-[12px] font-black font-jogos uppercase text-center tracking-tight transition-all text-orange-600";

                } else {

                    container.className =
                        "sidebar-icon-container w-16 h-16 rounded-[28px] flex items-center justify-center transition-all shadow-lg border-2 border-transparent bg-slate-50 text-slate-400 border-slate-200 group-hover:bg-orange-50 group-hover:text-orange-600 group-hover:border-orange-100";

                    label.className =
                        "sidebar-label text-[12px] font-black font-jogos uppercase text-center tracking-tight transition-all text-slate-400 opacity-60";
                }
            });

            if (typeof lucide !== "undefined") {
                lucide.createIcons();
            }
        };

        // INSTALL BUTTON

        setInterval(() => {

            const btnInstall = document.getElementById('btn-install');

            if (btnInstall) {

                if (window.deferredPrompt) {
                    btnInstall.classList.remove('hidden');
                } else {
                    btnInstall.classList.add('hidden');
                }
            }

        }, 1000);

        // PWA INSTALL

        window.deferredPrompt = null;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredPrompt = e;
        });

        window.addEventListener('appinstalled', () => {
            window.deferredPrompt = null;
        });

        window.installApp = async function() {

            if (!window.deferredPrompt) return;

            window.deferredPrompt.prompt();

            const { outcome } = await window.deferredPrompt.userChoice;

            if (outcome === 'accepted') {
                window.deferredPrompt = null;
            }
        };

        // SERVICE WORKER

        if ('serviceWorker' in navigator) {

            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });

        }

    </script>

</body>
</html>
