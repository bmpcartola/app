<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cartola BMP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#ff6321', // Orange
                        orange: {
                            400: '#fb923c',
                            500: '#f97316',
                            600: '#ea580c'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                        jogos: ['FontJogos', 'sans-serif']
                    }
                }
            }
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&family=Jersey+25&display=swap');
        
        @font-face {
            font-family: 'FontJogos';
            src: url('./FONTS/font_jogos.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        .font-jersey {
            font-family: 'Jersey 25', sans-serif;
        }

        body {
            background-color: #f8fafc;
            margin: 0;
            padding-bottom: 100px;
            -webkit-font-smoothing: antialiased;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }

        .gray-filter {
            filter: grayscale(1) opacity(0.3);
        }

        .font-jogos {
            font-family: 'FontJogos', 'Inter', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #e2e8f0;
            border-top-color: #ff6321;
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #ff6321;
        }
    </style>
</head>
<body class="text-slate-900">
    <header class="bg-white border-b border-slate-100 sticky top-0 z-40 px-4 py-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-gradient-to-br from-orange-400 to-orange-600 rounded-xl flex items-center justify-center shadow-lg shadow-orange-500/20">
                    <i data-lucide="trophy" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight uppercase">BMP <span class="text-orange-500 font-jogos">2026</span></h1>
                    <p class="text-[9px] text-slate-400 tracking-[0.3em] uppercase block md:hidden">Pro Dashboard</p>
                </div>
            </div>
            
            <div id="header-controls" class="flex items-center gap-3">
                <!-- Round and Serie selectors -->
            </div>
        </div>
    </header>

    <main id="main-content" class="max-w-7xl mx-auto p-4 md:p-8">
        <div class="flex flex-col items-center justify-center min-h-[60vh] gap-4">
            <div class="loader"></div>
            <p class="text-slate-400 font-jogos text-sm tracking-widest animate-pulse uppercase">SINCRONIZANDO DADOS...</p>
        </div>
    </main>

    <!-- Sidebar Backdrop -->
    <div id="sidebar-backdrop" onclick="toggleSidebar(false)" class="fixed inset-0 z-[50] bg-black/5 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-500"></div>

    <!-- Sidebar Toggle -->
    <button id="sidebar-toggle" onclick="toggleSidebar(true)" class="fixed left-0 top-1/2 -translate-y-1/2 z-[60] bg-white/80 backdrop-blur-md border border-slate-100 p-2 py-6 rounded-r-2xl shadow-xl hover:bg-white transition-all group">
        <i data-lucide="chevron-right" id="sidebar-icon" class="w-4 h-4 text-slate-400 group-hover:text-orange-500 transition-transform"></i>
    </button>

    <!-- Sidebar Menu -->
    <div id="sidebar-menu" class="fixed left-[-100px] top-1/2 -translate-y-1/2 z-[55] w-20 bg-orange-500/[0.15] backdrop-blur-xl border border-orange-500/10 rounded-r-3xl shadow-2xl py-8 transition-all duration-500 ease-in-out flex flex-col items-center gap-8">
        <div class="mb-4"></div>

        <ul class="flex flex-col gap-6">
            <li>
                <button onclick="bmpSetViewMode('campo'); toggleSidebar(false);" class="p-3 rounded-2xl bg-white/40 border border-white/40 hover:bg-white/60 transition-all group shadow-sm">
                    <i data-lucide="layout-list" class="w-6 h-6 text-orange-600"></i>
                </button>
            </li>
            <li>
                <button onclick="toggleSidebar(false);" class="p-3 rounded-2xl bg-white/40 border border-white/40 hover:bg-white/60 transition-all group shadow-sm">
                    <i data-lucide="help-circle" class="w-6 h-6 text-orange-600"></i>
                </button>
            </li>
        </ul>
        
        <div class="mt-auto opacity-40">
            <i data-lucide="trophy" class="w-4 h-4 text-orange-800"></i>
        </div>
    </div>

    <!-- Scroll to Top Button -->
    <button id="scroll-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="fixed bottom-10 right-6 z-50 p-4 bg-orange-500/10 backdrop-blur-md border border-orange-200/30 rounded-full shadow-lg opacity-0 pointer-events-none transition-all duration-500 hover:bg-orange-500/20 hover:scale-110 group">
        <i data-lucide="arrow-up" class="w-5 h-5 text-orange-600/60 group-hover:text-orange-600"></i>
    </button>

    <script src="josabet.js"></script>
</body>
</html>
